spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_service_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
       enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
logging:
  level:
    org.springframework.security: DEBUG