spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  application:
    name: user-service
  datasource:
    url: jdbc:h2:mem:user_service_db
    driver-class-name: org.h2.Driver
    username: guest
    password: guest
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
  h2:
    console:
       enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
logging:
  level:
    org.springframework.security: DEBUG
