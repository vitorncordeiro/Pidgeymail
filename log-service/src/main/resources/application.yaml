spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  datasource:
    url: jdbc:h2:mem:log_service_db;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: guest
    password: guest
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
  application:
    name: log-service
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        retry:
          enabled: true
          max-retries: 3
          initial-interval: 1000
          multiplier: 2
        default-requeue-rejected: false

logging:
  level:
    com.rabbitmqdemo: INFO